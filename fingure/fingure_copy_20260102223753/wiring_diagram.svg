<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .label { font: 600 18px Arial, sans-serif; fill: #111827; }
      .small { font: 15px Arial, sans-serif; fill: #374151; }
      .pin { font: 600 14px Arial, sans-serif; fill: #111827; }
      .wireTag { font: 700 12px Arial, sans-serif; fill: #111827; }
      .box { fill: #f9fafb; stroke: #111827; stroke-width: 3; rx: 8; }
      .module { fill: #ffffff; stroke: #111827; stroke-width: 2.5; rx: 8; }
      .note { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
      .legend { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .wire-red { stroke: #dc2626; stroke-width: 6; fill: none; }
      .wire-black { stroke: #111827; stroke-width: 6; fill: none; }
      .wire-green { stroke: #16a34a; stroke-width: 6; fill: none; }
      .wire-white { stroke: #9ca3af; stroke-width: 6; fill: none; stroke-dasharray: none; }
      .wire-purple { stroke: #7c3aed; stroke-width: 5; fill: none; }
      .wire-yellow { stroke: #ca8a04; stroke-width: 5; fill: none; }
      .wire-gray { stroke: #6b7280; stroke-width: 5; fill: none; }
      .wire-blue { stroke: #2563eb; stroke-width: 5; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="900" fill="#f3f4f6"/>
  <text x="40" y="54" class="title">ESP32 + ZFM60 v1.4 Wiring (Wire Color Guide)</text>
  <text x="40" y="84" class="small">fingure_copy_20260102223753.ino — cross connect Green(TX) and White(RX)</text>

  <!-- ZFM60 wire color legend -->
  <rect x="40" y="105" width="520" height="118" class="legend"/>
  <text x="60" y="135" class="label">ZFM60 Back v1.4 — Cable Colors</text>
  <rect x="60" y="152" width="28" height="10" fill="#dc2626" rx="2"/>
  <text x="98" y="162" class="small">Red = VCC (Power)</text>
  <rect x="280" y="152" width="28" height="10" fill="#111827" rx="2"/>
  <text x="318" y="162" class="small">Black = GND (Ground)</text>
  <rect x="60" y="182" width="28" height="10" fill="#16a34a" rx="2"/>
  <text x="98" y="192" class="small">Green = TX (Sensor sends data)</text>
  <rect x="280" y="182" width="28" height="10" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
  <text x="318" y="192" class="small">White = RX (Sensor receives data)</text>
  <text x="60" y="212" class="small">TX/RX must cross: Green → ESP32 RX | White ← ESP32 TX</text>

  <!-- ESP32 -->
  <rect x="440" y="250" width="320" height="540" class="box"/>
  <text x="520" y="290" class="label">ESP32 DevKit</text>

  <text x="470" y="333" class="pin">3V3</text>
  <circle cx="525" cy="328" r="7" fill="#dc2626"/>
  <text x="470" y="373" class="pin">GND</text>
  <circle cx="525" cy="368" r="7" fill="#111827"/>
  <text x="470" y="433" class="pin">GPIO16 RX2</text>
  <circle cx="590" cy="428" r="7" fill="#16a34a"/>
  <text x="470" y="473" class="pin">GPIO17 TX2</text>
  <circle cx="590" cy="468" r="7" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
  <text x="470" y="553" class="pin">GPIO21 SDA</text>
  <circle cx="590" cy="548" r="6" fill="#7c3aed"/>
  <text x="470" y="593" class="pin">GPIO22 SCL</text>
  <circle cx="590" cy="588" r="6" fill="#ca8a04"/>
  <text x="470" y="673" class="pin">GPIO26 BTN</text>
  <circle cx="590" cy="668" r="6" fill="#6b7280"/>
  <text x="470" y="733" class="pin">GPIO25 BUZZER</text>
  <circle cx="610" cy="728" r="6" fill="#2563eb"/>

  <!-- ZFM60 Fingerprint -->
  <rect x="55" y="280" width="300" height="260" class="module"/>
  <text x="95" y="318" class="label">ZFM60 Back v1.4</text>
  <text x="95" y="342" class="small">4-wire ribbon cable</text>

  <text x="85" y="378" class="pin">Red — VCC</text>
  <circle cx="175" cy="373" r="7" fill="#dc2626"/>
  <text x="85" y="418" class="pin">Black — GND</text>
  <circle cx="175" cy="413" r="7" fill="#111827"/>
  <text x="85" y="458" class="pin">Green — TX</text>
  <circle cx="175" cy="453" r="7" fill="#16a34a"/>
  <text x="85" y="498" class="pin">White — RX</text>
  <circle cx="175" cy="493" r="7" fill="#f8fafc" stroke="#9ca3af" stroke-width="2"/>

  <!-- ZFM60 wires to ESP32 -->
  <!-- Red VCC -> 3V3 -->
  <path class="wire-red" d="M175 373 C290 373, 350 328, 525 328"/>
  <text x="300" y="360" class="wireTag">RED</text>

  <!-- Black GND -> GND -->
  <path class="wire-black" d="M175 413 C290 413, 350 368, 525 368"/>
  <text x="285" y="400" class="wireTag">BLACK</text>

  <!-- Green TX -> ESP RX2 (GPIO16) -->
  <path class="wire-green" d="M175 453 C300 453, 380 428, 590 428"/>
  <text x="295" y="440" class="wireTag">GREEN (TX→RX)</text>

  <!-- White RX <- ESP TX2 (GPIO17) -->
  <path class="wire-white" d="M175 493 C300 493, 380 468, 590 468"/>
  <text x="285" y="510" class="wireTag">WHITE (RX←TX)</text>

  <!-- OLED -->
  <rect x="865" y="280" width="270" height="220" class="module"/>
  <text x="920" y="319" class="label">OLED SSD1306</text>
  <text x="910" y="365" class="pin">VCC</text>
  <circle cx="975" cy="360" r="6" fill="#dc2626"/>
  <text x="910" y="405" class="pin">GND</text>
  <circle cx="975" cy="400" r="6" fill="#111827"/>
  <text x="910" y="445" class="pin">SDA</text>
  <circle cx="975" cy="440" r="6" fill="#7c3aed"/>
  <text x="910" y="485" class="pin">SCL</text>
  <circle cx="975" cy="480" r="6" fill="#ca8a04"/>

  <path class="wire-red" d="M975 360 C865 360, 760 328, 525 328"/>
  <path class="wire-black" d="M975 400 C860 400, 760 368, 525 368"/>
  <path class="wire-purple" d="M975 440 C850 440, 760 548, 590 548"/>
  <path class="wire-yellow" d="M975 480 C850 480, 760 588, 590 588"/>

  <!-- Button -->
  <rect x="865" y="545" width="270" height="115" class="module"/>
  <text x="935" y="584" class="label">Push Button</text>
  <text x="910" y="625" class="pin">Leg 1 → GPIO26</text>
  <circle cx="975" cy="620" r="6" fill="#6b7280"/>
  <text x="910" y="650" class="pin">Leg 2 → GND</text>
  <circle cx="975" cy="645" r="6" fill="#111827"/>
  <path class="wire-gray" d="M975 620 C850 620, 735 668, 590 668"/>
  <path class="wire-black" d="M975 645 C850 645, 735 368, 525 368"/>

  <!-- Buzzer -->
  <rect x="70" y="580" width="270" height="120" class="module"/>
  <text x="150" y="619" class="label">Buzzer</text>
  <text x="105" y="660" class="pin">+ → GPIO25</text>
  <circle cx="165" cy="655" r="6" fill="#2563eb"/>
  <text x="105" y="685" class="pin">- → GND</text>
  <circle cx="165" cy="680" r="6" fill="#111827"/>
  <path class="wire-blue" d="M165 655 C300 655, 410 728, 610 728"/>
  <path class="wire-black" d="M165 680 C300 680, 370 368, 525 368"/>

  <!-- Notes -->
  <rect x="40" y="810" width="1120" height="72" class="note"/>
  <text x="60" y="838" class="label">Connection summary</text>
  <text x="60" y="862" class="small">ZFM60 Red→3V3 | Black→GND | Green(TX)→GPIO16(RX2) | White(RX)→GPIO17(TX2) | Button: GPIO26↔GND (internal pull-up) | Power: use 3.3V first; 5V only if module label allows.</text>

</svg>
